name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────────────────────────
  # Job 1: PHP Quality
  # Matrix: PHP 8.1, 8.2, 8.3 (minimum is 8.1 — codebase uses named
  # arguments and dev deps require doctrine/instantiator ^2 → PHP 8.1+).
  # NOTE: plugin header says Requires PHP: 7.4 — that needs updating.
  # ─────────────────────────────────────────────────────────────
  php-quality:
    name: PHP ${{ matrix.php }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.1', '8.2', '8.3']

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none
          tools: composer:v2

      - name: Validate composer.json
        run: composer validate --no-check-publish --strict

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: PHP syntax check
        run: |
          php -l subtleforms.php
          php -l uninstall.php
          find src -name "*.php" -print0 | xargs -0 -n1 php -l

      # dealerdirect/phpcodesniffer-composer-installer is a Composer plugin.
      # Composer 2.2+ blocks plugins by default; must be explicitly allowed
      # before `composer global require` or the install will fail.
      - name: Allow PHPCS Composer plugin
        run: composer global config --no-plugins allow-plugins.dealerdirect/phpcodesniffer-composer-installer true

      # Install PHPCS + WordPress Coding Standards globally.
      # WPCS is not in composer.json (dev-only tooling); we install it here
      # rather than bloating the project's composer.lock.
      # dealerdirect/phpcodesniffer-composer-installer auto-configures installed_paths.
      - name: Install PHPCS + WPCS
        run: |
          composer global require --no-interaction --no-progress \
            squizlabs/php_codesniffer:^3.9 \
            wp-coding-standards/wpcs:^3.1 \
            phpcompatibility/phpcompatibility-wp:^2.1 \
            dealerdirect/phpcodesniffer-composer-installer:^1.0
          phpcs --version

      # continue-on-error: true because the codebase has existing violations.
      # Remove this flag once the codebase is fully WPCS-compliant.
      - name: PHPCS
        run: |
          phpcs --standard=.phpcs.xml.dist --report=full \
            src/ subtleforms.php uninstall.php
        continue-on-error: true

      - name: PHPUnit (unit tests)
        run: vendor/bin/phpunit --testsuite unit --no-coverage

  # ─────────────────────────────────────────────────────────────
  # Job 2: JavaScript Quality
  # ─────────────────────────────────────────────────────────────
  js-quality:
    name: JS Quality
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      # No explicit lint script defined in package.json yet; this is a no-op
      # until an ESLint npm script is added. The .eslintrc.js config exists.
      - name: Lint
        run: npm run lint --if-present

      # Runs wp-scripts test-unit-js (Jest via @wordpress/scripts)
      - name: Unit tests
        run: npm run test --if-present

  # ─────────────────────────────────────────────────────────────
  # Job 3: Build Plugin & Upload Artifact
  # Runs only after php-quality and js-quality pass.
  # ─────────────────────────────────────────────────────────────
  build-plugin:
    name: Build Plugin
    runs-on: ubuntu-latest
    needs: [php-quality, js-quality]

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          coverage: none
          tools: composer:v2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # Install without dev deps so vendor/ mirrors what ships in the ZIP.
      - name: Install Composer (production)
        run: composer install --no-interaction --prefer-dist --no-progress --no-dev

      - name: Install Node dependencies
        run: npm ci --legacy-peer-deps

      # Builds admin, frontend, and block assets into build/
      - name: Build all assets
        run: npm run build:all

      # gulp quickZip packages build/, src/, vendor/autoload.php, vendor/composer/,
      # templates/, assets/ into dist/subtleforms-{version}.zip.
      # NOTE: readme.txt, uninstall.php, and languages/ are currently missing from
      # the gulpfile's copyFilesToTemp. See RELEASE.md → "Known Packaging Issues".
      - name: Create release ZIP
        run: npx gulp quickZip

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: subtleforms-plugin-zip
          path: dist/subtleforms-*.zip
          retention-days: 30

  # ─────────────────────────────────────────────────────────────
  # Job 4: WordPress Plugin Check
  # Uses the official WordPress plugin-check-action.
  # continue-on-error: true until all issues are resolved.
  # Must pass before WordPress.org submission.
  # ─────────────────────────────────────────────────────────────
  plugin-check:
    name: WordPress Plugin Check
    runs-on: ubuntu-latest
    needs: [build-plugin]

    steps:
      - uses: actions/checkout@v4

      # The official WordPress Plugin Check action installs WordPress
      # and runs all automated plugin checks against the checkout.
      # See: https://github.com/WordPress/plugin-check-action
      - name: WordPress Plugin Check
        uses: wordpress/plugin-check-action@v1
        with:
          build-dir: '.'
          # exclude-checks: add check names here if specific checks cause false positives
          # after first run review. Do not exclude checks that would block WP.org submission.
        continue-on-error: true
        # TODO: Remove continue-on-error after:
        # 1. First CI run completes and output is reviewed
        # 2. All blocking checks are resolved
        # 3. readme.txt Stable tag is synced to plugin version (1.8.1)
        # See RELEASE.md for the full pre-submission checklist.
