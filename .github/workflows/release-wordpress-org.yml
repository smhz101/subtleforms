name: Release to WordPress.org

# ⚠️  DISABLED — DO NOT ENABLE until all prerequisites below are met.
#
# Prerequisites before activating this workflow:
#   1. WordPress.org plugin submission approved (plugin slug confirmed).
#   2. GitHub secret WORDPRESS_ORG_USERNAME set to your wordpress.org username.
#   3. GitHub secret WORDPRESS_ORG_PASSWORD set to your wordpress.org application password.
#      (Application passwords: https://make.wordpress.org/meta/2021/08/19/application-passwords-wordpress-org/)
#   4. gulpfile.js packaging issues resolved (readme.txt, uninstall.php, languages/).
#      See RELEASE.md → "Known Packaging Issues".
#   5. readme.txt Stable tag synced to plugin version (currently 1.6.10 vs 1.8.1).
#   6. Full Plugin Check run passes without blocking issues.
#   7. Manual dry-run deployment verified at least once.
#
# When ready to activate:
#   - Remove the 'if: false' guard from the deploy job.
#   - Consider adding an on.push.tags trigger for automated releases.

on:
  workflow_dispatch:
    inputs:
      version:
        description: >
          Version to release. Must exactly match the Version header in subtleforms.php
          AND the Stable tag in readme.txt (e.g. 1.8.1).
        required: true
        type: string
      dry_run:
        description: 'Dry run — builds and validates, but skips the SVN commit.'
        required: false
        type: boolean
        default: true

concurrency:
  group: wordpress-org-release
  cancel-in-progress: false

jobs:
  # ─────────────────────────────────────────────────────────────
  # Preflight: validate version matches code before touching SVN
  # ─────────────────────────────────────────────────────────────
  preflight:
    name: Preflight checks
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Verify plugin version matches input
        run: |
          PLUGIN_VER=$(grep -m1 "Version:" subtleforms.php | sed 's/.*Version:\s*//' | tr -d '[:space:]')
          README_VER=$(grep -m1 "Stable tag:" readme.txt | sed 's/.*Stable tag:\s*//' | tr -d '[:space:]')
          INPUT_VER="${{ inputs.version }}"
          echo "Plugin header version : $PLUGIN_VER"
          echo "readme.txt Stable tag : $README_VER"
          echo "Workflow input version: $INPUT_VER"
          if [ "$PLUGIN_VER" != "$INPUT_VER" ]; then
            echo "::error::Plugin header version ($PLUGIN_VER) does not match workflow input ($INPUT_VER)"
            exit 1
          fi
          if [ "$README_VER" != "$INPUT_VER" ]; then
            echo "::error::readme.txt Stable tag ($README_VER) does not match workflow input ($INPUT_VER)"
            exit 1
          fi
          echo "✓ All version checks passed."

      - name: Check required secrets are set
        run: |
          if [ -z "${{ secrets.WORDPRESS_ORG_USERNAME }}" ]; then
            echo "::error::Secret WORDPRESS_ORG_USERNAME is not set."
            exit 1
          fi
          if [ -z "${{ secrets.WORDPRESS_ORG_PASSWORD }}" ]; then
            echo "::error::Secret WORDPRESS_ORG_PASSWORD is not set."
            exit 1
          fi
          echo "✓ Required secrets are present."

  # ─────────────────────────────────────────────────────────────
  # Build the production ZIP (same as CI build-plugin job)
  # ─────────────────────────────────────────────────────────────
  build:
    name: Build release ZIP
    runs-on: ubuntu-latest
    needs: preflight

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          coverage: none
          tools: composer:v2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Composer (production)
        run: composer install --no-interaction --prefer-dist --no-progress --no-dev

      - name: Install Node dependencies
        run: npm ci --legacy-peer-deps

      - name: Build all assets
        run: npm run build:all

      - name: Create release ZIP
        run: npx gulp quickZip

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: subtleforms-release-${{ inputs.version }}
          path: dist/subtleforms-*.zip
          retention-days: 90

  # ─────────────────────────────────────────────────────────────
  # Deploy to WordPress.org SVN
  #
  # ⚠️  if: false — DISABLED. Remove this line when ready.
  # ─────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to WordPress.org SVN
    runs-on: ubuntu-latest
    needs: build
    if: false  # ← REMOVE THIS LINE when prerequisites above are satisfied

    steps:
      - uses: actions/checkout@v4

      - name: Download release artifact
        uses: actions/download-artifact@v4
        with:
          name: subtleforms-release-${{ inputs.version }}
          path: dist/

      - name: Deploy to WordPress.org
        uses: 10up/action-wordpress-plugin-deploy@stable
        env:
          SVN_PASSWORD: ${{ secrets.WORDPRESS_ORG_PASSWORD }}
          SVN_USERNAME: ${{ secrets.WORDPRESS_ORG_USERNAME }}
          SLUG: subtleforms
          VERSION: ${{ inputs.version }}
          DRY_RUN: ${{ inputs.dry_run }}
          # BUILD_DIR: dist/subtleforms-${{ inputs.version }}
          # Uncomment BUILD_DIR when using the pre-built ZIP instead of repo root.
        # The 10up deploy action uses .distignore to exclude dev files from SVN.
        # Docs: https://github.com/10up/action-wordpress-plugin-deploy
